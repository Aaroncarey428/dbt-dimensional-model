# schema.yml
# Documentation and data quality tests for the models.
# Tests run with: dbt test

version: 2

models:
  - name: stg_jobs_tasks
    description: "Cleaned and standardized job and task records from the raw seed."
    columns:
      - name: task_id
        description: "Unique identifier for each task."
        tests:
          - not_null
          - unique
      - name: job_id
        description: "Identifier for the job a task belongs to."
        tests:
          - not_null
      - name: pro_reactive
        description: "Classifies the job as Proactive or Reactive."
        tests:
          - accepted_values:
              values: ['Proactive', 'Reactive']

  - name: dim_customer
    description: "One row per customer with descriptive attributes."
    columns:
      - name: customer_key
        description: "The customer name, used as the dimension key."
        tests:
          - not_null
          - unique

  - name: fct_jobs
    description: "One row per job with its measures."
    columns:
      - name: job_id
        description: "Unique identifier for each job."
        tests:
          - not_null
          - unique
      - name: customer_key
        description: "Links each job to a customer in dim_customer."
        tests:
          - not_null

  - name: report_customer_spend
    description: "Customer level spend, joining the fact to the dimension."
    columns:
      - name: customer_key
        description: "The customer the spend totals belong to."
        tests:
          - not_null
          - unique
